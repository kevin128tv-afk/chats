<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 채팅</title>

<style>
body{margin:0;font-family:sans-serif;background:#b2c7d9;}
.header{background:#ffe812;padding:15px;text-align:center;font-weight:bold;}
.chat{height:75vh;overflow:auto;padding:10px;}
.msg{margin:5px 0;}
.input{display:flex;padding:10px;background:#eee;}
input{flex:1;padding:10px;border:none;border-radius:20px;}
button{margin-left:5px;padding:10px;border:none;border-radius:20px;background:#ffe812;}
</style>
</head>

<body>

<div class="header">💬 채팅방</div>
<div class="chat" id="chat"></div>

<div class="input">
  <input id="name" placeholder="닉네임" style="max-width:80px;">
  <input id="msg" placeholder="메시지 입력">
  <button onclick="send()">전송</button>
</div>

<!-- 🔥 핵심 JS -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://uihaiyhkyagubijjztio.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpaGFpeWhreWFndWJpamp6dGlvIiwicm9sZSI6ImFub24i..."
);

// 전송 함수 (전역 등록)
window.send = async function(){
  const name = document.getElementById("name").value || "익명";
  const msgInput = document.getElementById("msg");
  const message = msgInput.value;

  if(!message) return;

  const { data, error } = await supabase
    .from("chat")
    .insert([{ name, message }])
    .select();

  if(error){
    alert("에러: " + error.message);
    return;
  }

  msgInput.value = "";

  // 바로 화면 표시
  const d = data[0];
  addMessage(d.name, d.message);
};

// 화면 추가
function addMessage(name, message){
  const div = document.createElement("div");
  div.className = "msg";
  div.textContent = name + ": " + message;
  document.getElementById("chat").appendChild(div);
}

// 기존 메시지 불러오기
async function load(){
  const { data } = await supabase.from("chat").select("*");
  document.getElementById("chat").innerHTML = "";
  data.forEach(d => addMessage(d.name, d.message));
}

// 2초마다 자동 새로고침
setInterval(load, 2000);

// 처음 실행
load();
</script>

</body>
</html>
