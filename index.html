<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 채팅</title>

<style>
body{margin:0;font-family:sans-serif;background:#b2c7d9;}
.header{background:#ffe812;padding:15px;text-align:center;font-weight:bold;}
.chat{height:75vh;overflow:auto;padding:10px;}
.msg{margin:6px 0;padding:8px 12px;border-radius:10px;background:white;max-width:70%;}
.me{background:#ffe812;margin-left:auto;}
.input{display:flex;padding:10px;background:#eee;}
input{flex:1;padding:10px;border:none;border-radius:20px;}
button{margin-left:5px;padding:10px;border:none;border-radius:20px;background:#ffe812;}
</style>
</head>

<body>

<div class="header">💬 채팅방</div>
<div class="chat" id="chat"></div>

<div class="input">
  <input id="name" placeholder="닉네임" style="max-width:80px;">
  <input id="msg" placeholder="메시지 입력">
  <button onclick="send()">전송</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// 🔥 여기가 핵심 (네 프로젝트)
const supabase = createClient(
  "https://lgmxiwlvqfcjjmvszbcu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnbXhpd2x2cWZjamptdnN6YmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzQ4NTQsImV4cCI6MjA5MTA1MDg1NH0.S5qksmgo_y_pUnqqbv3wD0NUH3PBy5SPo4v17--cpTw"
);

const chat = document.getElementById("chat");
let myName = "";

// 🔥 전송
window.send = async function(){
  const name = document.getElementById("name").value || "익명";
  const msgInput = document.getElementById("msg");
  const message = msgInput.value;

  if(!message) return;

  myName = name;

  const { data, error } = await supabase
    .from("chat")
    .insert([{ name, message }])
    .select();

  if(error){
    alert("에러: " + error.message);
    return;
  }

  msgInput.value = "";

  add(data[0]);
};

// 🔥 화면 추가
function add(data){
  const div = document.createElement("div");
  div.className = "msg " + (data.name === myName ? "me" : "");
  div.textContent = data.name + ": " + data.message;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔥 불러오기
async function load(){
  const { data } = await supabase.from("chat").select("*");
  chat.innerHTML = "";
  data.forEach(add);
}

// 🔥 자동 새로고침
setInterval(load, 2000);

// 시작
load();
</script>

</body>
</html>
