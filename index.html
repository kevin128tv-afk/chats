<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 채팅</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#b2c7d9;
}

.header{
  background:#ffe812;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.chat{
  height:78vh;
  overflow:auto;
  padding:10px;
}

.msg{
  display:flex;
  margin:8px 0;
}

.me{ justify-content:flex-end; }

.bubble{
  padding:10px 14px;
  border-radius:15px;
  max-width:65%;
  font-size:14px;
  word-break:break-word;
}

.me .bubble{
  background:#ffe812;
}

.other .bubble{
  background:white;
}

.name{
  font-size:11px;
  color:#666;
}

.time{
  font-size:10px;
  color:gray;
  margin-top:2px;
  text-align:right;
}

.input{
  display:flex;
  padding:10px;
  background:#eee;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
}

button{
  margin-left:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ffe812;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">💬 채팅방</div>
<div class="chat" id="chat"></div>

<div class="input">
  <input id="name" placeholder="닉네임" style="max-width:90px;">
  <input id="msg" placeholder="메시지 입력">
  <button onclick="send()">전송</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://uihaiyhkyagubijjztio.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpaGFpeWhreWFndWJpamp6dGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzI5MzAsImV4cCI6MjA5MTA0ODkzMH0.C2xnmnXbuWsOs6oS2LFV4NnDRIQn-H9PLJfAMyPEtV0"
);

const chat = document.getElementById("chat");
let myName = "";

// 🔥 메시지 보내기
async function send(){
  const nameInput = document.getElementById("name");
  const msgInput = document.getElementById("msg");

  const name = nameInput.value || "익명";
  const message = msgInput.value.trim();
  if(!message) return;

  myName = name;

  const { data, error } = await supabase
    .from("chat")
    .insert([{ name, message }])
    .select();

  if(error){
    alert("전송 실패: " + error.message);
    return;
  }

  // 🔥 바로 화면에 추가
  add(data[0]);

  msgInput.value = "";
}

// 🔥 메시지 화면 출력
function add(data){
  const isMe = data.name === myName;

  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");

  const time = new Date(data.created_at).toLocaleTimeString();

  div.innerHTML = `
    <div>
      ${!isMe ? `<div class="name">${data.name}</div>` : ""}
      <div class="bubble">${data.message}</div>
      <div class="time">${time}</div>
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔥 기존 메시지 불러오기
async function load(){
  const { data } = await supabase
    .from("chat")
    .select("*")
    .order("created_at", { ascending: true });

  data.forEach(add);
}

// 🔥 실시간 채팅
supabase
  .channel("chat")
  .on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "chat" },
    payload => add(payload.new)
  )
  .subscribe();

// 실행
load();

// 엔터 전송
document.getElementById("msg").addEventListener("keypress", e=>{
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
