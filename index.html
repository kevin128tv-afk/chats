<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카톡 스타일 채팅</title>

<style>
body{
  margin:0;
  font-family: 'Apple SD Gothic Neo', sans-serif;
  background:#b2c7d9;
}

.header{
  background:#ffe812;
  padding:15px;
  font-weight:bold;
  text-align:center;
}

.chat{
  height:80vh;
  overflow-y:auto;
  padding:10px;
}

.msg{
  display:flex;
  margin:5px 0;
}

.me{
  justify-content:flex-end;
}

.bubble{
  padding:10px 14px;
  border-radius:15px;
  max-width:60%;
  font-size:14px;
}

.me .bubble{
  background:#ffe812;
}

.other .bubble{
  background:white;
}

.name{
  font-size:12px;
  margin-bottom:2px;
  color:#555;
}

.input-box{
  display:flex;
  padding:10px;
  background:#eee;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ffe812;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">💬 채팅</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="name" placeholder="닉네임" style="max-width:80px;">
  <input id="msg" placeholder="메시지 입력">
  <button onclick="send()">전송</button>
</div>

<script>
const ws = new WebSocket("wss://ws.ifelse.io");

const chat = document.getElementById("chat");

function send(){
  const name = document.getElementById("name").value || "익명";
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  ws.send(name + "||" + msg);
  add(name, msg, true);

  document.getElementById("msg").value = "";
}

ws.onmessage = (e)=>{
  const [name, msg] = e.data.split("||");
  add(name, msg, false);
};

function add(name, msg, isMe){
  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");

  div.innerHTML = `
    <div>
      ${!isMe ? `<div class="name">${name}</div>` : ""}
      <div class="bubble">${msg}</div>
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 엔터 전송
document.getElementById("msg").addEventListener("keypress", e=>{
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
