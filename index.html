<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카톡 스타일 채팅</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#b2c7d9;
}

.chat{
  height:90vh;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:5px 0;
}

.me{
  text-align:right;
}

.bubble{
  display:inline-block;
  padding:10px 14px;
  border-radius:15px;
  max-width:70%;
}

.me .bubble{
  background:#ffeb33;
}

.other .bubble{
  background:white;
}

.input{
  display:flex;
  padding:10px;
  background:#eee;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#ffeb33;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input">
  <input id="name" placeholder="닉네임" style="max-width:80px;">
  <input id="msg" placeholder="메시지">
  <button onclick="send()">전송</button>
</div>

<script>
const ws = new WebSocket("wss://ws.ifelse.io"); // 무료 서버

const chat = document.getElementById("chat");

function send(){
  const name = document.getElementById("name").value || "익명";
  const msg = document.getElementById("msg").value;

  const data = name + "||" + msg;
  ws.send(data);

  add(name, msg, true);
  document.getElementById("msg").value = "";
}

ws.onmessage = (e)=>{
  const [name, msg] = e.data.split("||");
  add(name, msg, false);
};

function add(name, msg, isMe){
  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");

  div.innerHTML = `<div class="bubble">${name}: ${msg}</div>`;
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

// 엔터 전송
document.getElementById("msg").addEventListener("keypress", e=>{
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
